"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# Powerline-like prompt with segment backgrounds and separators.
format = """
[¯éÂ](fg:#6C6C6C)$os$username$hostname$directory$git_branch$git_status$status(fg:#6C6C6C)$character
"""

right_format = """
[¯éÂ](fg:#6C6C6C)$kubernetes$python$nodejs$golang$cmd_duration[¯é┤](fg:#6C6C6C)
"""

[os]
style = "bg:#6C6C6C fg:#1E1E1E"
disabled = false

[username]
show_always = false
style_user = "bg:#6C6C6C fg:#1E1E1E bold"
style_root = "bg:#6C6C6C fg:#1E1E1E bold"
format = "[$user ]($style)"

[hostname]
ssh_symbol = "¯¼ü "
ssh_only = true
style = "bg:#5F87AF fg:#1E1E1E bold"
format = "[¯é░](fg:#6C6C6C bg:#5F87AF)[ $hostname ]($style)"

[directory]
read_only = " ¾░î¥"
style = "bg:#3A6EA5 fg:#F8F8F2 bold"
truncation_length = 2
truncation_symbol = "ÔÇĞ/"
truncate_to_repo = false
format = "[¯é░](fg:#5F87AF bg:#3A6EA5)[ $path ]($style)"

[directory.substitutions]
